<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Project</title>
    <style>
        body { margin: 0; background: #222; color: #fff; font-family: Arial; text-align: center; }
        #game-board { display: grid; grid-template-columns: repeat(5, 80px); gap: 10px; justify-content: center; margin-top: 20px; }
        .cell { width: 80px; height: 80px; background: #444; border: 2px solid #666; cursor: pointer; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Game Interface</h1>
    <div id="status">Hero: Warrior | Card: Fireball</div>
    
    <div id="game-board"></div>

    <div class="controls">
        <button onclick="buildStructure()">Build Tower</button>
        <button onclick="switchCard()">Switch Card</button>
    </div>

    <script>
        // Hero and Card Data
        const gameState = {
            hero: "Warrior",
            card: "Fireball",
            buildings: 0
        };

        // Initialize Board
        function initBoard() {
            const board = document.getElementById('game-board');
            for (let i = 0; i < 10; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => console.log('Cell clicked: ' + i);
                board.appendChild(cell);
            }
        }

        // Build Logic
        function buildStructure() {
            gameState.buildings++;
            alert("Building placed! Total: " + gameState.buildings);
        }

        // Switch Logic
        function switchCard() {
            gameState.card = (gameState.card === "Fireball") ? "Ice Bolt" : "Fireball";
            document.getElementById('status').innerText = 
                "Hero: " + gameState.hero + " | Card: " + gameState.card;
        }

        initBoard();
    </script>
</body>
</html>
